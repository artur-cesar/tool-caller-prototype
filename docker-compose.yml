services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tool-caller-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      DATABASE_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 1000
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - .:/usr/src/app
      - app_node_modules:/usr/src/app/node_modules
    command: sh -c "npm run migration:run && npm run start:dev"
    networks:
      - tool-caller-network

  postgres:
    image: postgres:16-alpine
    container_name: tool-caller-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-tool_caller_prototype}
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-tool_caller_prototype}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tool-caller-network

volumes:
  app_node_modules:
  postgres_data:

networks:
  tool-caller-network:
